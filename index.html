<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成长笔记</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .btn-gradient-blue {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .btn-gradient-blue:hover {
            background: linear-gradient(135deg, #5a6fd6 0%, #6a4192 100%);
        }
        .btn-gradient-green {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        .btn-gradient-green:hover {
            background: linear-gradient(135deg, #0f8a7d 0%, #2fd46d 100%);
        }
        .btn-gradient-orange {
            background: linear-gradient(135deg, #fc4a1a 0%, #f7b733 100%);
        }
        .btn-gradient-orange:hover {
            background: linear-gradient(135deg, #e64317 0%, #e6a72e 100%);
        }
        .btn-gradient-purple {
            background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
        }
        .btn-gradient-purple:hover {
            background: linear-gradient(135deg, #9333ea 0%, #db2777 100%);
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        input:focus, textarea:focus, select:focus {
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }
    </style>
</head>
<body>
    <div class="container mx-auto px-4 py-8 max-w-5xl">
        <header class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-white/80 shadow-lg mb-4">
                <i class="fa-solid fa-book-open text-3xl text-purple-600"></i>
            </div>
            <h1 class="text-4xl font-bold bg-gradient-to-r from-purple-700 to-indigo-600 bg-clip-text text-transparent mb-2">成长笔记</h1>
            <p class="text-gray-600 text-lg">记录每一天的学习与成长</p>
        </header>

        <div class="flex flex-wrap justify-center gap-3 mb-6">
            <button onclick="exportData()" class="btn-gradient-blue text-white px-5 py-2.5 rounded-xl text-sm font-medium hover:shadow-lg transition-all">导出数据</button>
            <label class="btn-gradient-green text-white px-5 py-2.5 rounded-xl text-sm font-medium hover:shadow-lg transition-all cursor-pointer">
                导入数据
                <input type="file" id="import-file" accept=".json" onchange="importData()" class="hidden">
            </label>
            <button onclick="clearAllData()" class="bg-red-500 text-white px-5 py-2.5 rounded-xl text-sm font-medium hover:bg-red-600 transition-colors">清空数据</button>
            <button onclick="toggleGithubSettings()" class="bg-gray-700 text-white px-5 py-2.5 rounded-xl text-sm font-medium hover:bg-gray-800 transition-colors">GitHub 同步</button>
            <button onclick="syncToGithub()" id="btn-sync-github" class="btn-gradient-purple text-white px-5 py-2.5 rounded-xl text-sm font-medium hover:shadow-lg transition-all" style="display:none">同步到 GitHub</button>
            <button onclick="fetchFromGithub()" id="btn-fetch-github" class="bg-teal-600 text-white px-5 py-2.5 rounded-xl text-sm font-medium hover:bg-teal-700 transition-colors" style="display:none">从 GitHub 获取</button>
        </div>

        <div id="github-settings" class="hidden glass-card rounded-2xl p-6 mb-6">
            <h3 class="font-semibold text-gray-800 mb-4 flex items-center gap-2">
                <i class="fa-brands fa-github text-gray-700"></i> GitHub 配置
            </h3>
            <div class="flex flex-wrap gap-4">
                <input type="text" id="github-username" placeholder="GitHub 用户名" class="px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none w-48">
                <input type="text" id="github-repo" placeholder="仓库名称" class="px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none w-48">
                <input type="password" id="github-token" placeholder="Personal Access Token" class="px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none w-64">
                <button onclick="saveGithubConfig()" class="btn-gradient-purple text-white px-5 py-2.5 rounded-xl text-sm font-medium hover:shadow-lg transition-all">保存配置</button>
            </div>
            <div class="flex flex-wrap gap-4 mt-3">
                <button onclick="exportConfigLink()" class="btn-gradient-orange text-white px-5 py-2.5 rounded-xl text-sm font-medium hover:shadow-lg transition-all">导出配置链接</button>
                <button onclick="importConfigFromUrl()" class="bg-cyan-500 text-white px-5 py-2.5 rounded-xl text-sm font-medium hover:bg-cyan-600 transition-colors">从链接导入配置</button>
            </div>
            <p class="text-xs text-gray-500 mt-4">说明：需要创建一个 GitHub 仓库，并生成一个带有 repo 权限的 Personal Access Token</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <div class="glass-card rounded-2xl p-6 shadow-lg card-hover transition-all">
                <div class="flex items-center gap-3 mb-5">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-400 to-indigo-500 flex items-center justify-center">
                        <i class="fa-solid fa-target text-white"></i>
                    </div>
                    <h2 class="text-lg font-semibold text-gray-800">学习目标</h2>
                    <span id="goal-count" class="ml-auto text-sm text-gray-500 font-medium">0/0 已完成</span>
                </div>
                <div class="mb-4">
                    <input type="text" id="goal-input" placeholder="输入学习目标..." class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none">
                    <div class="flex gap-2 mt-3">
                        <input type="date" id="goal-date" class="px-4 py-3 border border-gray-200 rounded-xl focus:outline-none">
                        <button onclick="addGoal()" class="flex-1 btn-gradient-blue text-white py-3 rounded-xl font-medium hover:shadow-lg transition-all">添加</button>
                    </div>
                </div>
                <div id="goal-list" class="space-y-3 max-h-64 overflow-y-auto"></div>
            </div>

            <div class="glass-card rounded-2xl p-6 shadow-lg card-hover transition-all">
                <div class="flex items-center gap-3 mb-5">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-green-400 to-emerald-500 flex items-center justify-center">
                        <i class="fa-solid fa-book-open text-white"></i>
                    </div>
                    <h2 class="text-lg font-semibold text-gray-800">学习笔记</h2>
                </div>
                <div class="mb-4">
                    <input type="text" id="learning-title" placeholder="学习主题..." class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none mb-3">
                    <select id="learning-category" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none mb-3">
                        <option value="PHP">PHP</option>
                        <option value="Go">Go</option>
                        <option value="Vue">Vue</option>
                        <option value="MySQL">MySQL</option>
                        <option value="AI">AI</option>
                        <option value="其他">其他</option>
                    </select>
                    <textarea id="learning-content" placeholder="详细笔记内容..." rows="3" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none"></textarea>
                    <button onclick="addLearning()" class="w-full btn-gradient-green text-white py-3 rounded-xl font-medium hover:shadow-lg transition-all mt-3">添加笔记</button>
                </div>
                <div id="learning-list" class="space-y-3 max-h-64 overflow-y-auto"></div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <div class="glass-card rounded-2xl p-6 shadow-lg card-hover transition-all">
                <div class="flex items-center gap-3 mb-5">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-orange-400 to-amber-500 flex items-center justify-center">
                        <i class="fa-solid fa-comments text-white"></i>
                    </div>
                    <h2 class="text-lg font-semibold text-gray-800">沟通记录</h2>
                </div>
                <div class="mb-4">
                    <input type="text" id="comm-person" placeholder="沟通对象..." class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none mb-3">
                    <select id="comm-type" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none mb-3">
                        <option value="需求讨论">需求讨论</option>
                        <option value="技术交流">技术交流</option>
                        <option value="问题请教">问题请教</option>
                        <option value="工作汇报">工作汇报</option>
                    </select>
                    <textarea id="comm-content" placeholder="沟通内容及收获..." rows="3" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none"></textarea>
                    <button onclick="addCommunication()" class="w-full btn-gradient-orange text-white py-3 rounded-xl font-medium hover:shadow-lg transition-all mt-3">添加记录</button>
                </div>
                <div id="comm-list" class="space-y-3 max-h-64 overflow-y-auto"></div>
            </div>

            <div class="glass-card rounded-2xl p-6 shadow-lg card-hover transition-all">
                <div class="flex items-center gap-3 mb-5">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-purple-400 to-pink-500 flex items-center justify-center">
                        <i class="fa-solid fa-reflection text-white"></i>
                    </div>
                    <h2 class="text-lg font-semibold text-gray-800">总结反思</h2>
                </div>
                <div class="mb-4">
                    <select id="summary-type" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none mb-3">
                        <option value="每日总结">每日总结</option>
                        <option value="每周总结">每周总结</option>
                        <option value="每月总结">每月总结</option>
                        <option value="专题总结">专题总结</option>
                    </select>
                    <textarea id="summary-content" placeholder="总结内容..." rows="4" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none"></textarea>
                    <button onclick="addSummary()" class="w-full btn-gradient-purple text-white py-3 rounded-xl font-medium hover:shadow-lg transition-all mt-3">添加总结</button>
                </div>
                <div id="summary-list" class="space-y-3 max-h-64 overflow-y-auto"></div>
            </div>
        </div>

        <div class="glass-card rounded-2xl p-6 shadow-lg">
            <h2 class="text-lg font-semibold text-gray-800 mb-5 flex items-center gap-2">
                <i class="fa-solid fa-chart-pie text-purple-600"></i> 统计面板
            </h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="text-center p-5 bg-gradient-to-br from-blue-50 to-indigo-50 rounded-xl">
                    <div class="text-3xl font-bold text-blue-600" id="stat-goals">0</div>
                    <div class="text-sm text-gray-600 mt-1">学习目标</div>
                </div>
                <div class="text-center p-5 bg-gradient-to-br from-green-50 to-emerald-50 rounded-xl">
                    <div class="text-3xl font-bold text-green-600" id="stat-learning">0</div>
                    <div class="text-sm text-gray-600 mt-1">学习笔记</div>
                </div>
                <div class="text-center p-5 bg-gradient-to-br from-orange-50 to-amber-50 rounded-xl">
                    <div class="text-3xl font-bold text-orange-600" id="stat-comm">0</div>
                    <div class="text-sm text-gray-600 mt-1">沟通记录</div>
                </div>
                <div class="text-center p-5 bg-gradient-to-br from-purple-50 to-pink-50 rounded-xl">
                    <div class="text-3xl font-bold text-purple-600" id="stat-summary">0</div>
                    <div class="text-sm text-gray-600 mt-1">总结反思</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'growth_notes_data';
        const GITHUB_CONFIG_KEY = 'growth_notes_github_config';

        function getData() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                return data ? JSON.parse(data) : { goals: [], learning: [], communication: [], summary: [] };
            } catch (e) {
                return { goals: [], learning: [], communication: [], summary: [] };
            }
        }

        function saveData(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function addGoal() {
            const input = document.getElementById('goal-input');
            const dateInput = document.getElementById('goal-date');
            const text = input.value.trim();
            const date = dateInput.value;

            if (!text) {
                alert('请输入学习目标');
                return;
            }

            const data = getData();
            data.goals.push({
                id: Date.now(),
                text,
                date,
                completed: false
            });
            saveData(data);
            renderGoals();
            updateStats();

            input.value = '';
            dateInput.value = '';
        }

        function renderGoals() {
            const list = document.getElementById('goal-list');
            const data = getData();
            const completedCount = data.goals.filter(g => g.completed).length;
            
            document.getElementById('goal-count').textContent = `${completedCount}/${data.goals.length} 已完成`;

            list.innerHTML = data.goals.map(goal => `
                <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                    <div class="flex items-center gap-2">
                        <input type="checkbox" ${goal.completed ? 'checked' : ''} 
                               onchange="toggleGoal(${goal.id})" 
                               class="w-4 h-4 text-purple-500 rounded">
                        <span class="${goal.completed ? 'line-through text-gray-400' : ''}">${goal.text}</span>
                        ${goal.date ? `<span class="text-xs text-gray-400">${goal.date}</span>` : ''}
                    </div>
                    <button onclick="deleteGoal(${goal.id})" class="text-red-400 hover:text-red-600">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>
            `).join('');
        }

        function toggleGoal(id) {
            const data = getData();
            const goal = data.goals.find(g => g.id === id);
            if (goal) {
                goal.completed = !goal.completed;
                saveData(data);
                renderGoals();
                updateStats();
            }
        }

        function deleteGoal(id) {
            const data = getData();
            data.goals = data.goals.filter(g => g.id !== id);
            saveData(data);
            renderGoals();
            updateStats();
        }

        function addLearning() {
            const title = document.getElementById('learning-title').value.trim();
            const category = document.getElementById('learning-category').value;
            const content = document.getElementById('learning-content').value.trim();

            if (!title || !content) {
                alert('请填写完整的学习笔记');
                return;
            }

            const data = getData();
            data.learning.push({
                id: Date.now(),
                title,
                category,
                content,
                time: new Date().toLocaleString('zh-CN')
            });
            saveData(data);
            renderLearning();
            updateStats();

            document.getElementById('learning-title').value = '';
            document.getElementById('learning-content').value = '';
        }

        function renderLearning() {
            const list = document.getElementById('learning-list');
            const data = getData();

            list.innerHTML = data.learning.map(item => `
                <div class="p-3 bg-gray-50 rounded-lg">
                    <div class="flex items-center justify-between mb-1">
                        <span class="font-medium">${item.title}</span>
                        <span class="text-xs px-2 py-0.5 bg-purple-100 text-purple-600 rounded">${item.category}</span>
                    </div>
                    <p class="text-sm text-gray-600 line-clamp-2">${item.content}</p>
                    <div class="flex items-center justify-between mt-2">
                        <span class="text-xs text-gray-400">${item.time}</span>
                        <button onclick="deleteLearning(${item.id})" class="text-red-400 hover:text-red-600">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function deleteLearning(id) {
            const data = getData();
            data.learning = data.learning.filter(item => item.id !== id);
            saveData(data);
            renderLearning();
            updateStats();
        }

        function addCommunication() {
            const person = document.getElementById('comm-person').value.trim();
            const type = document.getElementById('comm-type').value;
            const content = document.getElementById('comm-content').value.trim();

            if (!person || !content) {
                alert('请填写完整的沟通记录');
                return;
            }

            const data = getData();
            data.communication.push({
                id: Date.now(),
                person,
                type,
                content,
                time: new Date().toLocaleString('zh-CN')
            });
            saveData(data);
            renderCommunication();
            updateStats();

            document.getElementById('comm-person').value = '';
            document.getElementById('comm-content').value = '';
        }

        function renderCommunication() {
            const list = document.getElementById('comm-list');
            const data = getData();

            list.innerHTML = data.communication.map(item => `
                <div class="p-3 bg-gray-50 rounded-lg">
                    <div class="flex items-center justify-between mb-1">
                        <span class="font-medium">${item.person}</span>
                        <span class="text-xs px-2 py-0.5 bg-orange-100 text-orange-600 rounded">${item.type}</span>
                    </div>
                    <p class="text-sm text-gray-600 line-clamp-2">${item.content}</p>
                    <div class="flex items-center justify-between mt-2">
                        <span class="text-xs text-gray-400">${item.time}</span>
                        <button onclick="deleteCommunication(${item.id})" class="text-red-400 hover:text-red-600">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function deleteCommunication(id) {
            const data = getData();
            data.communication = data.communication.filter(item => item.id !== id);
            saveData(data);
            renderCommunication();
            updateStats();
        }

        function addSummary() {
            const type = document.getElementById('summary-type').value;
            const content = document.getElementById('summary-content').value.trim();

            if (!content) {
                alert('请填写总结内容');
                return;
            }

            const data = getData();
            data.summary.push({
                id: Date.now(),
                type,
                content,
                time: new Date().toLocaleString('zh-CN')
            });
            saveData(data);
            renderSummary();
            updateStats();

            document.getElementById('summary-content').value = '';
        }

        function renderSummary() {
            const list = document.getElementById('summary-list');
            const data = getData();

            list.innerHTML = data.summary.map(item => `
                <div class="p-3 bg-gray-50 rounded-lg">
                    <div class="flex items-center justify-between mb-1">
                        <span class="text-xs px-2 py-0.5 bg-purple-100 text-purple-600 rounded">${item.type}</span>
                        <span class="text-xs text-gray-400">${item.time}</span>
                    </div>
                    <p class="text-sm text-gray-600 line-clamp-2">${item.content}</p>
                    <button onclick="deleteSummary(${item.id})" class="mt-2 text-red-400 hover:text-red-600 text-sm">
                        删除
                    </button>
                </div>
            `).join('');
        }

        function deleteSummary(id) {
            const data = getData();
            data.summary = data.summary.filter(item => item.id !== id);
            saveData(data);
            renderSummary();
            updateStats();
        }

        function updateStats() {
            const data = getData();
            document.getElementById('stat-goals').textContent = data.goals.length;
            document.getElementById('stat-learning').textContent = data.learning.length;
            document.getElementById('stat-comm').textContent = data.communication.length;
            document.getElementById('stat-summary').textContent = data.summary.length;
        }

        function exportData() {
            const data = getData();
            const content = JSON.stringify(data, null, 2);
            const blob = new Blob([content], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `成长笔记_${new Date().toLocaleDateString('zh-CN').replace(/\//g, '-')}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function importData() {
            const fileInput = document.getElementById('import-file');
            const file = fileInput.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    saveData(data);
                    renderGoals();
                    renderLearning();
                    renderCommunication();
                    renderSummary();
                    updateStats();
                    alert('数据导入成功！');
                } catch (error) {
                    alert('数据导入失败：文件格式不正确');
                }
            };
            reader.readAsText(file);
            fileInput.value = '';
        }

        function clearAllData() {
            if (confirm('确定要清空所有数据吗？此操作不可恢复！')) {
                localStorage.removeItem(STORAGE_KEY);
                renderGoals();
                renderLearning();
                renderCommunication();
                renderSummary();
                updateStats();
                alert('数据已清空');
            }
        }

        function toggleGithubSettings() {
            const settings = document.getElementById('github-settings');
            const btnSync = document.getElementById('btn-sync-github');
            const btnFetch = document.getElementById('btn-fetch-github');
            
            if (settings.classList.contains('hidden')) {
                settings.classList.remove('hidden');
                btnSync.style.display = 'inline-block';
                btnFetch.style.display = 'inline-block';
                loadGithubConfig();
            } else {
                settings.classList.add('hidden');
                btnSync.style.display = 'none';
                btnFetch.style.display = 'none';
            }
        }

        function saveGithubConfig() {
            const username = document.getElementById('github-username').value.trim();
            const repo = document.getElementById('github-repo').value.trim();
            const token = document.getElementById('github-token').value.trim();
            
            if (!username || !repo || !token) {
                alert('请填写完整的 GitHub 配置信息');
                return;
            }
            
            localStorage.setItem(GITHUB_CONFIG_KEY, JSON.stringify({ username, repo, token }));
            alert('GitHub 配置保存成功！');
        }

        function loadGithubConfig() {
            try {
                const config = localStorage.getItem(GITHUB_CONFIG_KEY);
                if (config) {
                    const { username, repo, token } = JSON.parse(config);
                    document.getElementById('github-username').value = username;
                    document.getElementById('github-repo').value = repo;
                    document.getElementById('github-token').value = token;
                }
            } catch (e) {
                console.error('Failed to load GitHub config:', e);
            }
        }

        function getGithubConfig() {
            try {
                const config = localStorage.getItem(GITHUB_CONFIG_KEY);
                return config ? JSON.parse(config) : null;
            } catch (e) {
                return null;
            }
        }

        async function syncToGithub() {
            const config = getGithubConfig();
            if (!config) {
                alert('请先配置 GitHub 信息');
                return;
            }

            const data = getData();
            const content = JSON.stringify(data, null, 2);
            const encodedContent = btoa(unescape(encodeURIComponent(content)));

            let sha = null;
            try {
                const checkResponse = await fetch(`https://api.github.com/repos/${config.username}/${config.repo}/contents/data.json`, {
                    headers: {
                        'Authorization': `token ${config.token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                if (checkResponse.ok) {
                    const existingFile = await checkResponse.json();
                    sha = existingFile.sha;
                }
            } catch (e) {
                console.log('File does not exist, creating new');
            }

            try {
                const body = {
                    message: `Update growth notes data - ${new Date().toLocaleString('zh-CN')}`,
                    content: encodedContent
                };
                if (sha) {
                    body.sha = sha;
                }

                const response = await fetch(`https://api.github.com/repos/${config.username}/${config.repo}/contents/data.json`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${config.token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify(body)
                });

                if (response.ok) {
                    alert('数据同步到 GitHub 成功！');
                } else {
                    const error = await response.json();
                    alert(`同步失败：${error.message || '未知错误'}`);
                }
            } catch (error) {
                alert(`同步失败：${error.message}`);
            }
        }

        async function fetchFromGithub() {
            const config = getGithubConfig();
            if (!config) {
                alert('请先配置 GitHub 信息');
                return;
            }

            try {
                const response = await fetch(`https://api.github.com/repos/${config.username}/${config.repo}/contents/data.json`, {
                    headers: {
                        'Authorization': `token ${config.token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (!response.ok) {
                    if (response.status === 404) {
                        alert('仓库中还没有 data.json 文件，请先同步一次');
                    } else {
                        const error = await response.json();
                        alert(`获取失败：${error.message || '未知错误'}`);
                    }
                    return;
                }

                const result = await response.json();
                const content = decodeURIComponent(escape(atob(result.content)));
                const data = JSON.parse(content);
                
                saveData(data);
                renderGoals();
                renderLearning();
                renderCommunication();
                renderSummary();
                updateStats();
                
                alert('从 GitHub 获取数据成功！');
            } catch (error) {
                alert(`获取失败：${error.message}`);
            }
        }

        function encryptConfig(config) {
            const jsonStr = JSON.stringify(config);
            let encrypted = '';
            const key = 'growth_notes_secret_key';
            for (let i = 0; i < jsonStr.length; i++) {
                encrypted += String.fromCharCode(jsonStr.charCodeAt(i) ^ key.charCodeAt(i % key.length));
            }
            return btoa(encrypted);
        }

        function decryptConfig(encoded) {
            const encrypted = atob(encoded);
            let decrypted = '';
            const key = 'growth_notes_secret_key';
            for (let i = 0; i < encrypted.length; i++) {
                decrypted += String.fromCharCode(encrypted.charCodeAt(i) ^ key.charCodeAt(i % key.length));
            }
            return JSON.parse(decrypted);
        }

        function exportConfigLink() {
            const username = document.getElementById('github-username').value.trim();
            const repo = document.getElementById('github-repo').value.trim();
            const token = document.getElementById('github-token').value.trim();
            
            if (!username || !repo || !token) {
                alert('请先填写完整的 GitHub 配置信息');
                return;
            }
            
            const config = { username, repo, token };
            const encryptedConfig = encryptConfig(config);
            const url = `${window.location.origin}${window.location.pathname}#${encryptedConfig}`;
            
            try {
                navigator.clipboard.writeText(url).then(() => {
                    alert('配置链接已复制到剪贴板！\n\n在新设备上打开这个链接即可自动加载配置。');
                }).catch(() => {
                    prompt('请复制以下链接到新设备使用：', url);
                });
            } catch (error) {
                prompt('请复制以下链接到新设备使用：', url);
            }
        }

        function importConfigFromUrl() {
            const hash = window.location.hash.substring(1);
            
            if (!hash) {
                return;
            }
            
            try {
                const config = decryptConfig(hash);
                localStorage.setItem(GITHUB_CONFIG_KEY, JSON.stringify(config));
                
                document.getElementById('github-username').value = config.username;
                document.getElementById('github-repo').value = config.repo;
                document.getElementById('github-token').value = config.token;
                
                alert('配置导入成功！');
            } catch (error) {
                console.error('配置导入失败:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            importConfigFromUrl();
        });

        renderGoals();
        renderLearning();
        renderCommunication();
        renderSummary();
        updateStats();
    </script>
</body>
</html>
